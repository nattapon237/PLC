<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff PLC 8</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #2b2b2b);
    color: white;
    text-align: center;
}

.container {
    padding: 40px 20px;
}

.logo {
    width: 120px;
    margin-bottom: 10px;
}

h1 {
    color: #ff3b3b;
    margin-bottom: 30px;
}

.qr-box {
    background: #8b0000;
    padding: 20px;
    border-radius: 20px;
    display: inline-block;
    box-shadow: 0 0 20px rgba(255,0,0,0.5);
}

.qr-box img {
    width: 250px;
    border-radius: 10px;
}

.footer {
    margin-top: 30px;
    opacity: 0.7;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

    <!-- โลโก้ -->
    <img src="logo.png" class="logo">

    <!-- ชื่อ -->
    <h1>STAFF PLC 8</h1>

    <!-- QR Code -->
    <div class="qr-box">
        <img src="qr.png" alt="QR Code">
    </div>

    <div class="footer">
        Scan เพื่อเข้าร่วม / ติดต่อ
    </div>

</div>

</body>
</html>
